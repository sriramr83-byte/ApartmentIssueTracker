<!DOCTYPE html>
<html>
<head>
<title>Apartment Portal</title>
<style>
    body { font-family: Arial; margin: 20px; }
    .container { display: flex; gap: 40px; flex-wrap: wrap; }
    form { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 350px; }
    input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { padding: 10px; background: green; color: white; border: none; width: 100%; }
    h2 { color: #333; }
    .ticketBox {
        background: #f4f4f4; 
        padding: 10px; 
        border-left: 5px solid blue;
        margin-bottom: 10px; 
        border-radius: 6px;
    }
</style>
</head>
<body>

<h1>Apartment Support & Warehouse Portal</h1>

<div class="container">

<!-- ISSUE FORM -->
<form id="issueForm">
    <h2>Raise an Issue</h2>

    <input name="name" placeholder="Your Name" required>
    <input name="flat" placeholder="Flat No" required>

    <select name="category" required>
        <option value="">Select Issue</option>
        <option>Plumbing</option>
        <option>Electrical</option>
        <option>Lift</option>
        <option>Housekeeping</option>
        <option>Other</option>
    </select>

    <textarea name="description" placeholder="Describe the issue" rows="4"></textarea>

    <button type="submit">Submit Issue</button>
</form>


<!-- STOCK FORM -->
<form id="stockForm">
    <h2>Warehouse Stock Entry</h2>

    <input name="item" placeholder="Item Name" required>
    <input type="number" name="qtyin" placeholder="Qty In">
    <input type="number" name="qtyout" placeholder="Qty Out">
    <input name="remarks" placeholder="Remarks">

    <button type="submit">Update Stock</button>
</form>

</div>

<hr>
<h2>Recent Tickets</h2>
<div id="ticketList">Loading...</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyFS16ACdfKewI3vq3zpH7JIGaZ11NfkIf8JU4Pp837kmpqVq_ESilGMaDJ0ScuFZLQLg/exec";  // ⭐ Replace with your Apps Script Web App URL


// Convert FormData → URL Encoded
function toUrlEncoded(fd){
    return new URLSearchParams(fd).toString();
}


// ---------------- SUBMIT ISSUE ----------------
document.getElementById("issueForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const fd = new FormData(e.target);
    fd.append("action", "addIssue");

    await fetch(apiURL, {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: toUrlEncoded(fd)
    });

    alert("Issue submitted!");
    e.target.reset();
    loadTickets();
});


// ---------------- SUBMIT STOCK ----------------
document.getElementById("stockForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const fd = new FormData(e.target);
    fd.append("action", "stock");

    await fetch(apiURL, {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: toUrlEncoded(fd)
    });

    alert("Stock updated!");
    e.target.reset();
});


// ---------------- LOAD TICKETS ----------------
function loadTickets(){
    fetch(apiURL + "?action=getTickets")
        .then(res => res.json())
        .then(data => {
            const box = document.getElementById("ticketList");
            box.innerHTML = "";

            data.forEach(t => {
                box.innerHTML += `
                <div class="ticketBox">
                    <b>Ticket:</b> ${t.ticket}<br>
                    <b>Time:</b> ${t.timestamp}<br>
                    <b>Name:</b> ${t.name}<br>
                    <b>Flat:</b> ${t.flat}<br>
                    <b>Category:</b> ${t.category}<br>
                    <b>Description:</b> ${t.description}
                </div>`;
            });
        });
}

loadTickets();
</script>

</body>
</html>
